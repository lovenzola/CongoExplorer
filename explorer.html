<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoExplorer -- Exploration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="explorer.css">
    <script src="explorer.js" type="module" defer></script>

</head>
<body>
    <div id="explo-container">

        <header class="header">
            <div class="header-title">
                <div class="logo">

                </div>

                <p class="title">Congo<span>Explorer</span></p>
            </div>

            <button class="disconnect">Se deconnecter</button>
        </header>

        <div class="banner">
            <p class="intro">Plongez au coeur de la faune Congolaise</p>
            <p class="texte">Explorer un écosystème riche et fascinant, découvrez des espèces uniques et comprenez les rôles essentielles qu'elles jouent dans la nature.</p>

            <div class="btns">
                <button class="learnMore-btn">En savoir plus</button>
                <button class="explore-btn">Explorer</button>

            </div>

        </div>

        <div class="down"><i class="fas fa-chevron-down"></i></div>

        <section id="learnMore">
            
        </section>
    </div>

</body>
</html>
